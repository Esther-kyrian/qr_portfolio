<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Portfolio Giscard LOUBOUNDZI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0f2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Times New Roman', Times, serif;
        }
        .qr-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 80, 80, 0.3);
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .qr-code {
            background: white;
            padding: 1rem;
            border-radius: 24px;
            display: inline-block;
            margin: 1.5rem 0;
        }
        .btn {
            background: #ff5050;
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #ff3333;
        }
        input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 10px 16px;
            width: 100%;
            color: white;
            margin-top: 1rem;
            text-align: center;
        }
        input:focus {
            outline: none;
            border-color: #ff5050;
        }
        .url-display {
            font-size: 0.8rem;
            word-break: break-all;
            background: rgba(0,0,0,0.4);
            padding: 8px;
            border-radius: 12px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="qr-card">
        <h1 class="text-3xl font-bold text-white mb-2">📱 Scannez-moi !</h1>
        <p class="text-gray-300 mb-4">Accédez directement à mon portfolio</p>
        
        <div id="qrcode" class="qr-code"></div>
        
        <div class="url-display text-gray-400" id="urlDisplay"></div>
        
        <div class="mt-6 flex flex-col gap-3">
            <a href="index.html" class="btn">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Retour au portfolio
            </a>
            <button id="copyBtn" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-full transition">
                📋 Copier le lien
            </button>
        </div>
        
        <p class="text-xs text-gray-500 mt-6">Imprimez ce QR code et collez-le sur votre CV papier.</p>
    </div>

    <!-- Librairie QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        // ========== CONFIGURATION ==========
        // Remplacez cette URL par l'adresse définitive de votre portfolio en ligne.
        // Par défaut, on utilise l'URL actuelle (sans le qr-code.html) pour pointer vers index.html
        let portfolioUrl = window.location.href.replace('qr-code.html', 'index.html');
        // Si vous hébergez sur un domaine différent, décommentez et modifiez la ligne ci-dessous :
        // portfolioUrl = "https://votre-domaine.com/index.html";
        // ===================================
        
        // Afficher l'URL dans la page
        document.getElementById('urlDisplay').innerText = `URL cible : ${portfolioUrl}`;
        
        // Générer le QR code
        new QRCode(document.getElementById("qrcode"), {
            text: portfolioUrl,
            width: 250,
            height: 250,
            colorDark: "#ff5050",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
        
        // Bouton copier le lien
        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(portfolioUrl).then(() => {
                alert("Lien copié dans le presse-papier !");
            }).catch(() => {
                prompt("Copiez manuellement ce lien :", portfolioUrl);
            });
        });
    </script>
</body>
</html>
